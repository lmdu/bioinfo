{% set page_name="profile" %}
{% extends "dulab/base.html" %}
{% block title %}个人资料{% endblock %}

{% block main %}
<div class="container my-5">
  <div class="card">
    <div class="row g-0">
      <div class="col-12 col-md-3 border-end">
        <div class="card-body">
          <h4 class="subheader">帐号信息</h4>
          <div class="list-group list-group-transparent">
            <a href="{{ url('dulab:profile') }}" class="list-group-item list-group-item-action d-flex align-items-center {% if submenu=='account' %}active{% endif %}">我的帐号</a>
            <a href="{{ url('dulab:setpasswd') }}" class="list-group-item list-group-item-action d-flex align-items-center {% if submenu=='password' %}active{% endif %}">修改密码</a>
          </div>
          <h4 class="subheader mt-4">发表文章</h4>
          <div class="list-group list-group-transparent">
            <a href="{{ url('dulab:postlist') }}" class="list-group-item list-group-item-action d-flex align-items-center {% if submenu=='postlist' %}active{% endif %}">文章列表</a>
            <a href="{{ url('dulab:postadd') }}" class="list-group-item list-group-item-action d-flex align-items-center {% if submenu=='postadd' %}active{% endif %}">添加文章</a>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-9 d-flex flex-column">
        {% block form %}{% endblock %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
