{% set page_name="profile" %}
{% extends "dulab/base.html" %}
{% block title %}{{ _("个人资料") }}{% endblock %}

{% block main %}
<div class="container my-5">
  <div class="card">
    <div class="row g-0">
      <div class="col-12 col-md-3 border-end">
        <div class="card-body">
          <h4 class="subheader">{{ _("帐号信息") }}</h4>
          <div class="list-group list-group-transparent">
            <a href="{{ url('dulab:profile') }}" class="list-group-item list-group-item-action d-flex align-items-center {% if submenu=='account' %}active{% endif %}">{{ _("我的帐号") }}</a>
            <a href="{{ url('dulab:setpasswd') }}" class="list-group-item list-group-item-action d-flex align-items-center {% if submenu=='password' %}active{% endif %}">{{ _("修改密码") }}</a>
          </div>
          <h4 class="subheader mt-4">{{  _("发表文章") }}</h4>
          <div class="list-group list-group-transparent">
            <a href="{{ url('dulab:postlist') }}" class="list-group-item list-group-item-action d-flex align-items-center {% if submenu=='postlist' %}active{% endif %}">{{ _("文章列表") }}</a>
            <a href="{{ url('dulab:postadd') }}" class="list-group-item list-group-item-action d-flex align-items-center {% if submenu=='postadd' %}active{% endif %}">{{ _("添加文章") }}</a>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-9 d-flex flex-column">
        {% block form %}{% endblock %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
