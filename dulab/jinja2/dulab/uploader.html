<script>
const E = window.wangEditor

class ImageManager {
	constructor() {
		this.title = '选择图片'
		this.iconSvg = '<svg viewBox="0 0 20 20"><path d="M1.201 1c-.662 0-1.2.47-1.2 1.1v14.248c0 .64.533 1.152 1.185 1.152h6.623v-7.236L6.617 9.15a.694.694 0 0 0-.957-.033L1.602 13.55V2.553l14.798.003V9.7H18V2.1c0-.63-.547-1.1-1.2-1.1zm11.723 2.805a2.1 2.1 0 0 0-1.621.832 2.127 2.127 0 0 0 1.136 3.357 2.13 2.13 0 0 0 2.611-1.506 2.13 2.13 0 0 0-.76-2.244 2.13 2.13 0 0 0-1.366-.44Z"></path><path d="M19.898 12.369v6.187a.844.844 0 0 1-.844.844h-8.719a.844.844 0 0 1-.843-.844v-7.312a.844.844 0 0 1 .843-.844h2.531a.84.84 0 0 1 .597.248l.838.852h4.75c.223 0 .441.114.6.272a.84.84 0 0 1 .247.597m-1.52.654-4.377.02-1.1-1.143H11v6h7.4l-.023-4.877Z" clip-rule="evenodd"></path></svg>'
		this.tag = 'button'
		this.showModal = true
		this.modalWidth = 500
	}
	getValue(editor) {
		return ''
	}
	isActive(editor) {
		return false
	}
	isDisabled(editor) {
		return false
	}
	exec(editor, value) {

	}
	getModalPositionNode(editor) {
		return null
	}
	getModalContentElem(editor) {
		var content = document.createElement('div')
		return content
	}
}

E.Boot.registerMenu({
	key: 'imagemanager',
	factory() {
		return new ImageManager()
	}
})

const ts = document.querySelectorAll('textarea');
ts.forEach((t, i) => {
	t.style.display = 'none';

	var editor_wrapper = document.createElement('div');
	editor_wrapper.id = 'editor-wrapper-' + i;
	editor_wrapper.style.border = '1px solid #ccc';
	editor_wrapper.style.zIndex = '10000';
	var editor_toolbar = document.createElement('div');
	editor_toolbar.id = 'editor-toolbar-' + i;
	editor_toolbar.style.borderBottom = '1px solid #ccc';
	editor_wrapper.append(editor_toolbar);
	var editor_content = document.createElement('div');
	editor_content.id = 'editor-content-' + i;
	editor_content.style.height = '500px';
	editor_wrapper.append(editor_content);

	t.after(editor_wrapper);

	var editor = E.createEditor({
		selector: '#' + editor_content.id,
		html: t.value,
		config: {
			onChange(editor) {
				t.value = editor.getHtml();
			},
			MENU_CONF: {
				uploadImage: {
					server: '{{ url("dulab:photo-upload") }}',
					fieldName: 'image',
					maxNumberOfFiles: 10,
					allowedFileTypes: ['image/*'],
					headers: {
						'X-CSRFToken': '{{ csrf_token }}',
					}
				}
			}
		},
		mode: 'default'
	});

	var editor_toolbar = E.createToolbar({
		editor,
		selector: '#' + editor_toolbar.id,
		config: {
			excludeKeys: ['uploadVideo'],
			insertKeys: {
				index: 23,
				keys: ['imagemanager'],
			}
		},
		mode: 'default'
	});
});
</script>
